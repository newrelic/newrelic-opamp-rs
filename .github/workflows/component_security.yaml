name: .. 🚧 🐈‍⬛ Audit

on:
  workflow_call:
    secrets:
      slack_webhook:
        required: false
permissions:
  contents: read

jobs:
  audit:
    name: Rust audit scanner
    runs-on: ubuntu-latest
    if: ${{ ! github.event.schedule }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  audit_scheduled:
    name: Scheduled rust audit scanner
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Send notification to Slack Workflow
        if: ${{ failure() }}
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          payload: |
            {
              "text": ":rotating_light: Hi AC (@hero), critical or high vulnerabilities found in the OpAMP client, see scheduled security action. :rotating_light:"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook }}
